name: Bug 报告
description: 报告 Coco 插件、SDK 或资源的可复现问题
title: "[Bug]: "
labels: ["type:bug", "status:needs-repro"]
body:
  - type: dropdown
    id: host
    attributes:
      label: 宿主
      options:
        - WPS Writer
        - Microsoft Word
        - ONLYOFFICE
        - SDK / Node.js
        - 浏览器
        - 其他
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: 版本信息
      description: Coco 版本、宿主版本和操作系统
      placeholder: "例如：Coco 0.1.0 / WPS 版本号 / Windows 11"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 打开……
        2. 点击……
        3. 看到……
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期结果
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 脱敏日志或补充信息
      description: 请勿提交密钥、个人信息、客户数据或未脱敏文档
  - type: checkboxes
    id: privacy
    attributes:
      label: 数据确认
      options:
        - label: 我确认提交的内容已经脱敏，并且我有权公开分享
          required: true
