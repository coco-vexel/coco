name: 功能建议
description: 建议新的产品能力、宿主支持或公共资源
title: "[Feature]: "
labels: ["type:feature"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 请描述使用场景和当前困难
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: 相关领域
      options:
        - WPS 插件
        - Microsoft 插件
        - ONLYOFFICE 插件
        - Core SDK
        - OOJSON
        - Workflow
        - Skill
        - Template
        - 文档与社区
    validations:
      required: true
